<section class="vertical-timeline">
 
  <div class="vertical-timeline__step" (click)="handleScheduleClick(1)">
    <div class="vertical-timeline__circle">1</div>
    <div class="vertical-timeline__content">
      <span class="vertical-timeline__time">15:00</span>
      <h3 class="vertical-timeline__title">ჯვრისწერა</h3>
    </div>
  </div>

  <div class="vertical-timeline__step" (click)="handleScheduleClick(2)">
    <div class="vertical-timeline__circle">2</div>
    <div class="vertical-timeline__content">
      <span class="vertical-timeline__time">18:00</span>
      <h3 class="vertical-timeline__title">ხელისმოწერა</h3>
    </div>
  </div>

  <div class="vertical-timeline__step">
    <div class="vertical-timeline__circle">3</div>
    <div class="vertical-timeline__content">
      <h3 class="vertical-timeline__title">ფოტოსესია</h3>
    </div>
  </div>

  <div class="vertical-timeline__step">
    <div class="vertical-timeline__circle">4</div>
    <div class="vertical-timeline__content">
      <h3 class="vertical-timeline__title">საქორწილო ვახშამი</h3>
    </div>
  </div>

</section>
