<div class="scene" [class.hide]="sceneHidden()">
  <img
    class="envelope-photo"
    [class.zoom]="opened()"
    src="assets/images/envelope-seal.jpg"
    alt="მოსაწვევის კონვერტი"
    role="button"
    tabindex="0"
    aria-label="დააჭირეთ კონვერტს რომ გახსნათ მოსაწვევი"
    draggable="false"
    (click)="openLetter()"
    (keydown)="onKeydown($event)"
  />
</div>
